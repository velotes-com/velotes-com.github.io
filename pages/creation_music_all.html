const container = document.getElementById("playlist");

tracks.forEach((track, index) => {
  const html = `
    <div class="audio-player">
      <p>${track.title}</p>
      <audio id="${track.id}" src="${track.src}" preload="metadata"></audio>
      <div class="controls">
        <button onclick="togglePlay('${track.id}')" class="play-btn">▶️</button>
        <input type="range" class="progress" data-audio="${track.id}" value="0" step="1" min="0">
        <span class="time" data-audio="${track.id}">0:00</span>
        <input type="range" min="0" max="1" step="0.01" value="1" data-volume="${track.id}" class="volume">
      </div>
    </div>`;
  container.insertAdjacentHTML("beforeend", html);

  // if ([14, 36].includes(index)) {
  if ([0, 39].includes(index)) {
    container.insertAdjacentHTML("beforeend", `<hr class="track-divider">`);
  }
});

const players = {};
let isDragging = false; // ← КЛЮЧЕВОЕ: флаг перетаскивания

function togglePlay(id) {
  const audio = document.getElementById(id);
  Object.values(players).forEach(player => {
    if (player !== audio && !player.paused) player.pause();
  });
  if (audio.paused) audio.play(); else audio.pause();
  players[id] = audio;
}

// Обработчики перетаскивания (input + mouse/touch события)
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll('.progress').forEach(slider => {
    const audioId = slider.dataset.audio;
    const audio = document.getElementById(audioId);
    
    // Начало перетаскивания
    slider.addEventListener('mousedown', () => isDragging = true);
    slider.addEventListener('touchstart', () => isDragging = true);
    
    // Конец перетаскивания
    slider.addEventListener('mouseup', () => { isDragging = false; });
    slider.addEventListener('touchend', () => { isDragging = false; });
    
    // Изменение времени
    slider.addEventListener('input', () => {
      audio.currentTime = slider.value;
    });
  });

  document.querySelectorAll('.volume').forEach(slider => {
    slider.addEventListener('input', () => {
      document.getElementById(slider.dataset.volume).volume = slider.value;
    });
  });

  // Обновление ПРЯМО ТОЛЬКО если НЕ перетаскивают!
  setInterval(() => {
    if (!isDragging) {
      document.querySelectorAll('audio').forEach(audio => {
        const progress = document.querySelector(`.progress[data-audio="${audio.id}"]`);
        const timeEl = document.querySelector(`.time[data-audio="${audio.id}"]`);
        if (progress && timeEl && !isDragging) {
          progress.max = Math.floor(audio.duration || 100);
          progress.value = Math.floor(audio.currentTime || 0);
          timeEl.textContent = formatTime(audio.currentTime);
        }
      });
    }
  }, 250);
});

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s < 10 ? '0' + s : s}`;
}
